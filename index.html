<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Minhas Finanças PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d1642 100%);
            min-height: 100vh;
            color: #333;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a237e 0%, #0d1642 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.3);
            width: 90%;
            max-width: 400px;
        }

        .login-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(212,175,55,0.5);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }

        .login-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #0d1642;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }

        .header {
            background: rgba(255,255,255,0.95);
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a237e;
        }

        .header-title span {
            color: #d4af37;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.total {
            background: rgba(26,35,126,0.1);
            color: #1a237e;
        }

        .stat-icon.available {
            background: rgba(34,197,94,0.1);
            color: #22c55e;
        }

        .stat-icon.used {
            background: rgba(212,175,55,0.1);
            color: #d4af37;
        }

        .stat-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-info .number {
            font-size: 32px;
            font-weight: 700;
            color: #1a237e;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #1a237e;
            color: white;
            border-color: #1a237e;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .codes-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .codes-header {
            background: #1a237e;
            color: white;
            padding: 20px;
            display: grid;
            grid-template-columns: 120px 100px 1fr 150px 150px;
            gap: 15px;
            font-weight: 600;
            font-size: 14px;
        }

        .code-row {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 120px 100px 1fr 150px 150px;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .code-row:hover {
            background: #f8f9fa;
        }

        .code-row.used {
            background: #fff8e1;
        }

        .code-text {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: #1a237e;
            font-size: 16px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .status-badge.available {
            background: rgba(34,197,94,0.1);
            color: #22c55e;
        }

        .status-badge.used {
            background: rgba(212,175,55,0.1);
            color: #d4af37;
        }

        .user-info {
            font-size: 13px;
            color: #666;
        }

        .user-info .name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .contact-info {
            font-size: 12px;
            color: #888;
        }

        .contact-info div {
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn.copy {
            background: #1a237e;
            color: white;
        }

        .action-btn.whatsapp {
            background: #25d366;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading i {
            font-size: 48px;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a237e;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .toast.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .codes-header,
            .code-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .codes-header {
                display: none;
            }

            .code-row {
                padding: 20px;
                border-bottom: 2px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-title">
                <i class="fas fa-shield-alt"></i><br>
                Painel Administrativo
            </div>
            <input type="text" class="login-input" id="adminUser" placeholder="Usuário">
            <input type="password" class="login-input" id="adminPass" placeholder="Senha">
            <button class="login-btn" onclick="login()">Entrar</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-wallet"></i> Minhas Finanças <span>PRO</span> - Admin
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-key"></i>
                </div>
                <div class="stat-info">
                    <h3>Total de Códigos</h3>
                    <div class="number" id="totalCodes">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon available">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h3>Disponíveis</h3>
                    <div class="number" id="availableCodes">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon used">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3>Ativados</h3>
                    <div class="number" id="usedCodes">0</div>
                </div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterCodes('all')">Todos</button>
            <button class="filter-btn" onclick="filterCodes('available')">Disponíveis</button>
            <button class="filter-btn" onclick="filterCodes('used')">Ativados</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar código ou cliente..." oninput="searchCodes()">
            </div>
        </div>

        <div class="codes-container">
            <div class="codes-header">
                <div>CÓDIGO</div>
                <div>STATUS</div>
                <div>DADOS DO CLIENTE</div>
                <div>CONTATO</div>
                <div>AÇÕES</div>
            </div>
            <div id="codesList">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando códigos...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Operação realizada!</span>
    </div>

    <script>
        // Firebase Config - ASM Financeiro Pro
        const firebaseConfig = {
            apiKey: "AIzaSyCcVS9BVbZjogyUQ9vvYExPNqyDwKy9TcQ",
            authDomain: "asm-financeiro-pro.firebaseapp.com",
            databaseURL: "https://asm-financeiro-pro-default-rtdb.firebaseio.com",
            projectId: "asm-financeiro-pro",
            storageBucket: "asm-financeiro-pro.firebasestorage.app",
            messagingSenderId: "209611478144",
            appId: "1:209611478144:web:ad61d87cf7d6500f56c265"
        };

        // Admin credentials
        const ADMIN_USER = 'ASM1715';
        const ADMIN_PASS = '1329ASM';

        let app, database;
        let allCodes = [];
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            try {
                app = firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                console.log('Firebase inicializado com sucesso');
            } catch (error) {
                console.error('Erro ao inicializar Firebase:', error);
            }
        });

        function login() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                loadCodes();
            } else {
                alert('Usuário ou senha incorretos!');
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('adminUser').value = '';
            document.getElementById('adminPass').value = '';
        }

        async function loadCodes() {
            try {
                console.log('Carregando códigos do Firebase...');
                const snapshot = await database.ref('activationCodesFinancas').once('value');
                const data = snapshot.val();
                
                console.log('Dados recebidos:', data);
                
                if (!data) {
                    document.getElementById('codesList').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Nenhum código encontrado no Firebase</p>
                        </div>
                    `;
                    return;
                }

                // Converter objeto em array
                allCodes = Object.entries(data).map(([key, value]) => ({
                    code: key,
                    ...value
                }));

                console.log(`Total de códigos carregados: ${allCodes.length}`);
                
                updateStats();
                renderCodes();

            } catch (error) {
                console.error('Erro ao carregar códigos:', error);
                document.getElementById('codesList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Erro ao carregar dados: ${error.message}</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = allCodes.length;
            const used = allCodes.filter(c => c.used === true).length;
            const available = total - used;

            document.getElementById('totalCodes').textContent = total.toLocaleString('pt-BR');
            document.getElementById('availableCodes').textContent = available.toLocaleString('pt-BR');
            document.getElementById('usedCodes').textContent = used.toLocaleString('pt-BR');
        }

        function renderCodes() {
            const list = document.getElementById('codesList');
            let filtered = [...allCodes];

            // Apply filter
            if (currentFilter === 'available') {
                filtered = allCodes.filter(c => c.used !== true);
            } else if (currentFilter === 'used') {
                filtered = allCodes.filter(c => c.used === true);
            }

            // Apply search
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(c => {
                    const matchCode = c.code && c.code.toLowerCase().includes(searchTerm);
                    const matchUser = c.userData && (
                        (c.userData.name && c.userData.name.toLowerCase().includes(searchTerm)) ||
                        (c.userData.email && c.userData.email.toLowerCase().includes(searchTerm)) ||
                        (c.userData.cpf && c.userData.cpf.includes(searchTerm)) ||
                        (c.userData.whatsapp && c.userData.whatsapp.includes(searchTerm))
                    );
                    return matchCode || matchUser;
                });
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>Nenhum código encontrado com os filtros atuais</p>
                    </div>
                `;
                return;
            }

            // Renderizar apenas os primeiros 100 para performance, com botão "Carregar mais" se necessário
            const codesToRender = filtered.slice(0, 200);
            const hasMore = filtered.length > 200;

            let html = codesToRender.map(code => {
                const isUsed = code.used === true;
                const userData = code.userData || {};
                
                // Formatar data de ativação
                let activatedAt = '-';
                if (code.activatedAt) {
                    try {
                        const date = new Date(code.activatedAt * 1000);
                        activatedAt = date.toLocaleDateString('pt-BR');
                    } catch (e) {
                        activatedAt = '-';
                    }
                }

                // Formatar data de criação
                let createdAt = '-';
                if (code.createdAt) {
                    try {
                        const date = new Date(code.createdAt * 1000);
                        createdAt = date.toLocaleDateString('pt-BR');
                    } catch (e) {
                        createdAt = '-';
                    }
                }

                return `
                    <div class="code-row ${isUsed ? 'used' : ''}">
                        <div class="code-text">${code.code || 'N/A'}</div>
                        <div>
                            <span class="status-badge ${isUsed ? 'used' : 'available'}">
                                ${isUsed ? '✓ USADO' : 'DISPONÍVEL'}
                            </span>
                        </div>
                        <div class="user-info">
                            ${isUsed ? `
                                <div class="name">${userData.name || 'Nome não informado'}</div>
                                <div style="color: #888; font-size: 12px;">
                                    CPF: ${userData.cpf || 'N/A'} | Ativado: ${activatedAt}
                                </div>
                            ` : `<span style="color: #999;">Criado: ${createdAt}</span>`}
                        </div>
                        <div class="contact-info">
                            ${isUsed ? `
                                <div><i class="fas fa-envelope"></i> ${userData.email || 'N/A'}</div>
                                <div><i class="fas fa-phone"></i> ${userData.whatsapp || 'N/A'}</div>
                            ` : '-'}
                        </div>
                        <div class="actions">
                            <button class="action-btn copy" onclick="copyCode('${code.code}')">
                                <i class="fas fa-copy"></i> Copiar
                            </button>
                            ${isUsed && userData.whatsapp ? `
                                <button class="action-btn whatsapp" onclick="openWhatsApp('${userData.whatsapp}')">
                                    <i class="fab fa-whatsapp"></i> WhatsApp
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (hasMore) {
                html += `
                    <div style="padding: 20px; text-align: center; background: #f8f9fa;">
                        <p style="color: #666; margin-bottom: 10px;">
                            Mostrando 200 de ${filtered.length.toLocaleString('pt-BR')} códigos
                        </p>
                        <button onclick="renderAllCodes()" style="padding: 10px 20px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Mostrar Todos
                        </button>
                    </div>
                `;
            }

            list.innerHTML = html;
        }

        function renderAllCodes() {
            // Renderizar todos sem limite
            const list = document.getElementById('codesList');
            let filtered = [...allCodes];

            if (currentFilter === 'available') {
                filtered = allCodes.filter(c => c.used !== true);
            } else if (currentFilter === 'used') {
                filtered = allCodes.filter(c => c.used === true);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(c => {
                    const matchCode = c.code && c.code.toLowerCase().includes(searchTerm);
                    const matchUser = c.userData && (
                        (c.userData.name && c.userData.name.toLowerCase().includes(searchTerm)) ||
                        (c.userData.email && c.userData.email.toLowerCase().includes(searchTerm)) ||
                        (c.userData.cpf && c.userData.cpf.includes(searchTerm)) ||
                        (c.userData.whatsapp && c.userData.whatsapp.includes(searchTerm))
                    );
                    return matchCode || matchUser;
                });
            }

            const html = filtered.map(code => {
                const isUsed = code.used === true;
                const userData = code.userData || {};
                
                let activatedAt = '-';
                if (code.activatedAt) {
                    try {
                        const date = new Date(code.activatedAt * 1000);
                        activatedAt = date.toLocaleDateString('pt-BR');
                    } catch (e) {
                        activatedAt = '-';
                    }
                }

                let createdAt = '-';
                if (code.createdAt) {
                    try {
                        const date = new Date(code.createdAt * 1000);
                        createdAt = date.toLocaleDateString('pt-BR');
                    } catch (e) {
                        createdAt = '-';
                    }
                }

                return `
                    <div class="code-row ${isUsed ? 'used' : ''}">
                        <div class="code-text">${code.code || 'N/A'}</div>
                        <div>
                            <span class="status-badge ${isUsed ? 'used' : 'available'}">
                                ${isUsed ? '✓ USADO' : 'DISPONÍVEL'}
                            </span>
                        </div>
                        <div class="user-info">
                            ${isUsed ? `
                                <div class="name">${userData.name || 'Nome não informado'}</div>
                                <div style="color: #888; font-size: 12px;">
                                    CPF: ${userData.cpf || 'N/A'} | Ativado: ${activatedAt}
                                </div>
                            ` : `<span style="color: #999;">Criado: ${createdAt}</span>`}
                        </div>
                        <div class="contact-info">
                            ${isUsed ? `
                                <div><i class="fas fa-envelope"></i> ${userData.email || 'N/A'}</div>
                                <div><i class="fas fa-phone"></i> ${userData.whatsapp || 'N/A'}</div>
                            ` : '-'}
                        </div>
                        <div class="actions">
                            <button class="action-btn copy" onclick="copyCode('${code.code}')">
                                <i class="fas fa-copy"></i> Copiar
                            </button>
                            ${isUsed && userData.whatsapp ? `
                                <button class="action-btn whatsapp" onclick="openWhatsApp('${userData.whatsapp}')">
                                    <i class="fab fa-whatsapp"></i> WhatsApp
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            list.innerHTML = html;
            
            // Scroll suave para mostrar que carregou mais
            showToast(`${filtered.length.toLocaleString('pt-BR')} códigos carregados!`);
        }

        function filterCodes(type) {
            currentFilter = type;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderCodes();
        }

        function searchCodes() {
            renderCodes();
        }

        function copyCode(code) {
            if (!code) return;
            navigator.clipboard.writeText(code).then(() => {
                showToast(`Código ${code} copiado!`);
            }).catch(err => {
                console.error('Erro ao copiar:', err);
                // Fallback para dispositivos móveis
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(`Código ${code} copiado!`);
            });
        }

        function openWhatsApp(whatsapp) {
            if (!whatsapp) return;
            const number = whatsapp.replace(/\D/g, '');
            if (number.length < 10) {
                showToast('Número de WhatsApp inválido');
                return;
            }
            window.open(`https://wa.me/55${number}`, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Enter key on login
        document.getElementById('adminPass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        
        // Enter key on user
        document.getElementById('adminUser').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('adminPass').focus();
            }
        });
    </script>
</body>
</html>
